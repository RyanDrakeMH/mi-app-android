<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>RDTranslator Pro - Interface de Traducción</title>
    <!-- Tailwind CSS v3 CDN with plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: {
                sans: ['Outfit', 'sans-serif'],
              },
              colors: {
                'dark-bg-main': '#0f1115',
                'dark-bg-card': '#1a1b23',
                'dark-bg-sidebar': '#1e1f26',
                'accent-orange': '#f59e0b',
                'accent-purple': '#6366f1',
                'text-muted': '#9ca3af',
              }
            }
          }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark-bg-main text-gray-200 font-sans h-screen flex overflow-hidden">
    
    <!-- Full screen drop overlay -->
    <div id="dropOverlay" class="hidden fixed inset-0 bg-[#0f1115e6] backdrop-blur-sm z-[1000] flex flex-col items-center justify-center text-accent-orange border-4 border-dashed border-accent-orange m-4 rounded-[2rem] transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M12 12v6"/><path d="m15 15-3-3-3 3"/></svg>
        <h2 class="mt-4 text-2xl text-white font-bold">Suelta tus archivos .rpy aquí</h2>
    </div>

    <input type="file" id="fileInput" accept=".rpy" multiple class="hidden">

    <!-- BEGIN: Sidebar -->
    <aside class="w-16 bg-dark-bg-sidebar border-r border-gray-800 flex flex-col items-center py-4 space-y-6 flex-shrink-0 z-10" data-purpose="main-navigation">
        <div class="relative group cursor-pointer" onclick="document.getElementById('fileInput').click()" title="Añadir archivos">
            <div class="p-2 bg-gray-800 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition-colors">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
            </div>
        </div>
        
        <div class="relative group cursor-pointer" id="sidebarExportAllBtn" title="Exportar Todo">
            <div class="p-2 text-gray-400 hover:text-white transition-colors">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="12" y1="18" x2="12" y2="12"></line>
                    <line x1="9" y1="15" x2="15" y2="15"></line>
                </svg>
            </div>
            <span id="sidebarFileCount" class="absolute -top-1 -right-1 bg-accent-orange text-[10px] font-bold px-1.5 rounded-full text-black hidden">0</span>
        </div>
    </aside>
    <!-- END: Sidebar -->

    <main class="flex-1 flex flex-col overflow-hidden relative">
        
        <!-- Empty State -->
        <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-text-muted z-20 bg-dark-bg-main">
            <svg class="w-16 h-16 text-gray-800 mb-6" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            <h2 class="text-2xl text-gray-300 font-bold mb-2">Ningún archivo abierto</h2>
            <p class="text-gray-500">Arrastra archivos .rpy aquí o añádelos desde la barra lateral</p>
            <button onclick="document.getElementById('fileInput').click()" class="mt-6 bg-gray-800 hover:bg-gray-700 text-white font-medium py-2 px-6 rounded-lg transition-colors">Seleccionar Archivos</button>
        </div>

        <div id="appInterface" class="flex-1 flex flex-col overflow-hidden hidden">
            <!-- BEGIN: TopBar -->
            <header class="h-16 bg-dark-bg-card border-b border-gray-800 flex items-center justify-between px-6 flex-shrink-0" data-purpose="top-navigation">
                <div class="flex items-center space-x-6 w-1/2">
                    <div class="flex items-center space-x-2">
                        <span class="font-bold text-lg tracking-tight">RDTranslator <span class="text-text-muted font-normal text-sm">Pro</span></span>
                    </div>
                    <div class="relative flex-1 max-w-md">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                            <svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
                        </span>
                        <input id="searchInput" class="w-full bg-dark-bg-main border-transparent focus:ring-1 focus:ring-accent-orange focus:border-accent-orange rounded-md py-1.5 pl-10 text-sm text-gray-300" placeholder="Buscar traducciones o personajes..." type="text"/>
                    </div>
                </div>
                <div class="flex items-center space-x-6">
                    <!-- Progress Bar -->
                    <div class="flex flex-col items-end space-y-1 text-xs">
                        <div class="flex items-center space-x-2 w-32 h-2 bg-gray-800 rounded-full relative overflow-hidden">
                            <div id="progressBar" class="absolute h-full bg-accent-orange rounded-full transition-all duration-300 ease-out" style="width: 0%;"></div>
                        </div>
                        <span id="progressText" class="text-accent-orange font-bold font-mono">0% Completado</span>
                    </div>
                    <!-- Font Size Slider -->
                    <div class="flex items-center space-x-3 text-xs hidden md:flex">
                        <span class="text-text-muted">Letra</span>
                        <div class="flex items-center bg-dark-bg-main rounded-full px-2 py-1 space-x-2 border border-gray-800">
                            <input id="fontSizeSlider" class="w-20 h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer" type="range" min="14" max="28" value="18"/>
                            <span id="fontSizeDisplay" class="font-mono w-8 text-right">18px</span>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3">
                        <button id="downloadBtn" class="bg-accent-orange hover:bg-orange-500 transition-colors text-black font-bold py-1.5 px-4 rounded-md flex items-center text-sm disabled:opacity-50 disabled:cursor-not-allowed">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
                            Exportar Archivo
                        </button>
                    </div>
                </div>
            </header>
            <!-- END: TopBar -->

            <!-- BEGIN: FilterBar -->
            <div class="flex items-center bg-dark-bg-card border-b border-gray-800 px-4 h-10 overflow-x-auto no-scrollbar" id="fileTabsContainer">
                <!-- File Tabs injected here via JS -->
            </div>
            
            <nav class="px-6 py-4 bg-dark-bg-main flex items-center space-x-2 overflow-x-auto border-b border-gray-800/50" id="filterNav">
                <button data-filter="all" class="filter-btn px-4 py-1.5 bg-white text-black text-sm rounded-full font-semibold whitespace-nowrap transition-colors">Todos <span class="ml-1 opacity-50" id="countAll">0</span></button>
                <button data-filter="translated" class="filter-btn px-4 bg-gray-700 text-white text-sm rounded-full font-medium hover:bg-gray-600 transition-colors whitespace-nowrap py-1.5">Traducidos <span class="ml-1 opacity-50" id="countTranslated">0</span></button>
                <button data-filter="pending" class="filter-btn px-4 bg-gray-700 text-white text-sm rounded-full font-medium hover:bg-gray-600 transition-colors whitespace-nowrap py-1.5">Pendientes <span class="ml-1 opacity-50" id="countPending">0</span></button>
                
                <span class="text-xs text-gray-500 ml-4 font-mono" id="statsDisplay">Mostrando 0 bloques</span>
            </nav>
            <!-- END: FilterBar -->

            <div id="translationScrollArea" class="flex-1 overflow-y-auto px-6 pb-20 pt-4 space-y-4 custom-scrollbar transform-gpu will-change-transform overscroll-contain">
                <div id="translationList" class="flex flex-col gap-4 w-full">
                    <!-- Cards will be injected here via JS -->
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
